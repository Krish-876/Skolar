name: Skolar
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  dio: ^5.3.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  get_it: ^7.6.0
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  logger: ^2.0.0
  uuid: ^4.0.0
  intl: ^0.19.0
  dartz: ^0.10.0
  http: ^1.1.0
  flutter_dotenv: ^5.1.0
  fl_chart: ^1.2.0
  google_fonts: ^8.1.0
  file_picker: ^11.0.2
  confetti: ^0.8.0
  flutter_ringtone_player: ^4.0.0+4
  vibration: ^3.1.8
  supabase: ^2.10.6
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.3.1
  flutter_animate: ^4.5.2
  rive: 0.13.4
  gif: ^2.3.0
  supabase_flutter: ^2.14.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
    - assets/animations/
    - .env                    
    
  fonts:                      
    - family: ClashDisplay
      fonts:
        - asset: assets/fonts/ClashDisplay-Regular.otf
        - asset: assets/fonts/ClashDisplay-Medium.otf
          weight: 500
        - asset: assets/fonts/ClashDisplay-Semibold.otf
          weight: 600
        - asset: assets/fonts/ClashDisplay-Bold.otf
          weight: 700
    - family: GoogleSans      
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.jpeg"
  min_sdk_android: 21