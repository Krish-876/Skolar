name: CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      flutter: ${{ steps.filter.outputs.flutter }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            flutter:
              - 'lib/**'
              - '!lib/core/ai/rag_llms/**'
              - '!lib/core/ai/nova/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
            python:
              - 'lib/core/ai/rag_llms/**'
              - 'lib/core/ai/nova/**'

  format:
    needs: changes
    if: needs.changes.outputs.flutter == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

  pr-title:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $TITLE"

          if [ ${#TITLE} -gt 100 ]; then
            echo "PR title exceeds 100 characters."
            exit 1
          fi

          if [[ "$TITLE" =~ [[:space:]]$ ]] || [[ "$TITLE" =~ \.$ ]]; then
            echo "PR title must not end with a period, space, or tab."
            exit 1
          fi

          PATTERN='^(feat|fix|schema|refactor|test|docs|style|chore|perf|ci): .+$'
          if ! [[ "$TITLE" =~ $PATTERN ]]; then
            echo "PR title must match: <type>: <summary>"
            echo "Valid types: feat, fix, schema, refactor, test, docs, style, chore, perf, ci"
            exit 1
          fi

          echo "PR title is valid."

  codegen:
    needs: changes
    if: needs.changes.outputs.flutter == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Generate code (freezed / json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Fail if codegen produced uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated files are out of date. Run build_runner locally and commit the output."
            git status --porcelain
            exit 1
          fi

  analyze:
    needs: changes
    if: needs.changes.outputs.flutter == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Create placeholder .env for CI
        run: echo "" > .env
      - name: Analyze
        run: dart analyze

  test:
    needs: changes
    if: needs.changes.outputs.flutter == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Create placeholder .env for CI
        run: echo "" > .env
      - name: Run tests
        run: flutter test --coverage

  python-lint:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: 'lib/core/ai/rag_llms/requirements*.txt'
      - name: Install dependencies
        run: |
          pip install -r lib/core/ai/rag_llms/requirements.txt
          pip install -r lib/core/ai/rag_llms/requirements-dev.txt
      - name: Lint
        run: ruff check lib/core/ai/
      - name: Type check
        run: |
          if [ -d "lib/core/ai/nova" ]; then
            mypy lib/core/ai/nova --ignore-missing-imports
          fi

  branch-up-to-date:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure branch is up to date with master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor origin/master HEAD; then
            echo "Branch is behind master — rebase before pushing (git fetch origin && git rebase origin/master)."
            exit 1
          fi